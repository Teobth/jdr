<div class="admin-control-panel">
  <h3>Sélection de l'Affiche Publique</h3>

  @if (options().length > 0) {
    <select [ngModel]="selectedDisplayId()" (ngModelChange)="onDisplayChange($event)">
      @for (option of options(); track option.id) {
        <option [ngValue]="option.id">{{ option.nom }}</option>
      }
    </select>
  } @else {
    <p style="color: red;">Aucune option reçue via WebSocket. Vérifie la connexion !</p>
  }
</div>
