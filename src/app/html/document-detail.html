<div class="detail-card">
    <h2>Détails du Document</h2>
    
    <div class="photo-wrapper">
        <a [href]="$safeNavigationMigration(doc()?.fullImageUrl)">
            <img [src]="$safeNavigationMigration(doc()?.fullImageUrl)" 
                [alt]="'Doc ' + $safeNavigationMigration(doc()?.id)" 
                class="document-image">
        </a>
    </div>

    <div class="stats-container">
        <p><strong>Titre :</strong> {{ doc()?.titre }}</p>
        
        <div class="content-block"> 
            <strong>Contenu :</strong> 
            <p class="content-text">{{ doc()?.contenu }}</p>
        </div>
    </div>
    
    <hr class="separator">
    <a routerLink="/enquete" class="back-link">Retour à l'enquête</a>
</div>
