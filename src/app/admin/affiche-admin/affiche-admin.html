<div class="admin-control-panel">

  <h3>Sélection de l'Affiche Publique</h3>

  <select [(ngModel)]="selectedDisplayId" (change)="onDisplayChange()">
    
    @for (option of options; track option.id) {
      <option 
        [ngValue]="option.id"
      >
        {{ option.imageUrl }} 
      </option>
    } @empty {
      <option disabled>Aucune option disponible</option>
    }
  </select>
  
  <p>ID sélectionné à diffuser : **{{ selectedDisplayId }}**</p>
</div>
