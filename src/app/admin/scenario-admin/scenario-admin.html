<h2>Gestion du Scénario</h2>

<div class="admin-nav-bar" style="margin-bottom: 20px; display: flex; gap: 10px;">
    <button routerLink="/admin/personnages" class="btn-admin-nav">
        Gérer les Personnages
    </button>

    <button routerLink="/admin/documents" class="btn-admin-nav">
        Gérer les Documents
    </button>

    <button (click)="basculerFiltre()" class="btn-admin-filter">
        {{ afficherSeulementNonCompletes ? 'Afficher TOUT le scénario' : 'Masquer les étapes COMPLÉTÉES' }}
    </button>
</div>

<app-admin-affiche></app-admin-affiche>

<div class="scenario-tracker-page">
    <div class="tracker-header">
        <h1>Suivi de l'Intrigue Principale</h1>
        <p v-if="afficherSeulementNonCompletes" style="color: orange;">
            <em>Filtre actif : étapes complétées masquées</em>
        </p>
    </div>

    <div class="scenario-list">
        @for(step of filteredScenario; track step.id) {
            <div class="step-card">
                <div class="step-info">
                    <span class="step-id">{{ step.id }}</span>
                    <h2>{{ step.title }}</h2>
                    <p class="description">{{ step.description }}</p>
                </div>

                <div class="step-status">
                    <span class="status-badge" [class]="getStatusClass(step.status)">
                        {{ step.status }}
                    </span>

                    <div class="status-actions">
                        <button 
                            (click)="updateStatus(step, 'EN COURS')"
                            [disabled]="step.status === 'EN COURS'"
                            class="btn-action btn-in-progress">
                            En Cours
                        </button>
                        
                        <button 
                            (click)="updateStatus(step, 'COMPLÉTÉ')"
                            [disabled]="step.status === 'COMPLÉTÉ'"
                            class="btn-action btn-complete">
                            Complété
                        </button>
                        
                        <button 
                            (click)="updateStatus(step, 'BLOQUÉ')"
                            [disabled]="step.status === 'BLOQUÉ'"
                            class="btn-action btn-blocked">
                            Bloqué
                        </button>
                    </div>
                </div>
            </div>
        } @empty {
            <div style="padding: 40px; text-align: center; background: #f9f9f9; border-radius: 8px;">
                <p>Aucune étape à afficher avec ce filtre.</p>
            </div>
        }
    </div>
</div>
