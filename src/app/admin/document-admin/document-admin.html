<h2>Panneau d'Administration des Documents</h2>

<button routerLink="/admin/personnages" class="btn-admin-nav">
    Gérer les Personnages
</button>

<button routerLink="/admin/scenario" class="btn-admin-nav">
    Accéder au scénario
</button>

<button (click)="basculerFiltre()">
    {{ afficherSeulementVisibles ? 'Afficher TOUS les documents' : 'Afficher seulement les VISIBLES' }}
</button>

<div class="admin-grid">
    @for(doc of documents$ | async; track doc.id) {
        <div class="admin-card">
            <h3>{{ doc.titre }}</h3> <p>ID: {{ doc.id }}</p>
            <p>
                Statut: <strong 
                    [class.visible-oui]="doc.accessible"
                    [class.visible-non]="!doc.accessible">
                    {{ doc.accessible ? 'Visible pour les joueurs' : 'Caché pour les joueurs' }}
                </strong>
            </p>
            <button (click)="basculerAcces(doc)">
                {{ doc.accessible ? 'Rendre Caché' : 'Rendre Visible' }}
            </button>
        </div>
    }
</div>
